name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with placeholder Supabase env
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-key
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
        run: npm run build

      - name: Audit high severity
        run: npm audit --audit-level=high

      - name: Validate public docs
        run: |
          set -euo pipefail
          test -f README.md
          test -f docs/index.html
          test -f docs/assets/favicon.svg
          test -f docs/assets/social-preview.svg
          grep -q "Public Surface" README.md
          grep -q "Security & Privacy" README.md
          grep -q "og:image" docs/index.html
          grep -q "twitter:image" docs/index.html
